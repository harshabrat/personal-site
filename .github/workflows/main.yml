on: push
name: Build and deploy GH Pages

permissions:
  contents: write

jobs:
  build:
    name: shalzz/zola-deploy-action
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: shalzz/zola-deploy-action
        uses: shalzz/zola-deploy-action@master
        env:
          PAGES_BRANCH: gh-pages
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZOLA_ENV: prod
